# AIOS Lite Squad Configuration

squad:
  name: "AIOS Lite"
  environment: "production"

agents_config:
  default_model: "claude-opus"
  temperature: 0.7
  max_tokens: 2048

  agent_overrides:
    product:
      role: "Product Manager"
      focus: "requirements and storytelling"

    architect:
      role: "System Architect"
      focus: "technical decisions and patterns"

    dev:
      role: "Software Engineer"
      focus: "code implementation"

    ux:
      role: "UX Designer"
      focus: "user experience and design"

    ship:
      role: "QA & DevOps Engineer"
      focus: "quality assurance and deployment"

workflows:
  default_workflow: "greenfield_workflow"
  allowed_workflows:
    - "greenfield_workflow"
    - "brownfield_workflow"

documentation:
  required_directories:
    - "docs/stories"
    - "docs/decisions"
    - "docs/ux"

  required_files:
    - "docs/prd.md"
    - "docs/architecture.md"
    - "docs/datamodel.md"

quality:
  enforce_atomic_tasks: true
  require_tests: true
  enforce_code_review: true
  enforce_qa_approval: true

versioning:
  min_node: "18.0.0"
  min_npm: "9.0.0"

# AIOS Lite Squad Manifest
# Framework enxuto de desenvolvimento guiado por IA para MVPs e projetos ágeis

metadata:
  name: "AIOS Lite"
  version: "1.0.0"
  description: "Framework enxuto de desenvolvimento guiado por IA para MVPs e projetos ágeis com economia radical de tokens"
  author: "Robson Marques"
  license: "MIT"
  repository: "https://github.com/Romarck/aios-lite"
  documentation: "https://github.com/Romarck/aios-lite/blob/master/README.md"

agents:
  - name: "product"
    file: "agents/product.agent.md"
    description: "Brainstorm, PRD, stories, backlog"

  - name: "architect"
    file: "agents/architect.agent.md"
    description: "Stack, arquitetura, modelo de dados, ADRs"

  - name: "dev"
    file: "agents/dev.agent.md"
    description: "Implementação (agnóstico de tecnologia)"

  - name: "ux"
    file: "agents/ux.agent.md"
    description: "Pesquisa, wireframes, sistema de design"

  - name: "ship"
    file: "agents/ship.agent.md"
    description: "QA, aprovação de stories, deploy"

features:
  - name: "Token Economy"
    description: "Redução de até 88% de tokens em comparação com AIOS completo"

  - name: "GitHub Copilot First"
    description: "Designed para funcionar nativamente com GitHub Copilot"

  - name: "Technology Agnostic"
    description: "Agnóstico de tecnologia - suporta qualquer stack"

  - name: "Story-Driven Development"
    description: "Desenvolvimento guiado por stories com rastreabilidade"

  - name: "Full-Stack Support"
    description: "Suporta projetos greenfield e brownfield"

requirements:
  node: ">=18.0.0"
  npm: ">=9.0.0"

tags:
  - "development-framework"
  - "ai-agents"
  - "token-economy"
  - "github-copilot"
  - "claude-code"
  - "mvp"
  - "agile"

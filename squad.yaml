name: "AIOS Lite"
version: "1.0.0"
description: "Framework enxuto de desenvolvimento guiado por IA para MVPs e projetos ágeis com economia radical de tokens (-88% vs AIOS completo)"

aios:
  minVersion: "1.0.0"

author:
  name: "Robson Marques"
  email: "robson@example.com"
  organization: "AIOS Lite"

license: "MIT"
repository: "https://github.com/Romarck/aios-lite"
documentation: "https://github.com/Romarck/aios-lite/blob/master/README.md"

components:
  agents:
    - id: "product"
      name: "Product Visionary"
      file: "agents/product.agent.md"
      description: "Especialista em Product Management guiando brainstorm, PRD, stories e backlog"

    - id: "architect"
      name: "System Architect"
      file: "agents/architect.agent.md"
      description: "Responsável pela arquitetura, stack tecnológico, modelo de dados e ADRs"

    - id: "dev"
      name: "Implementation Developer"
      file: "agents/dev.agent.md"
      description: "Implementa features com código agnóstico de tecnologia"

    - id: "ux"
      name: "UX Research Lead"
      file: "agents/ux.agent.md"
      description: "Conduz pesquisa, wireframes e sistema de design"

    - id: "ship"
      name: "Quality & Release Manager"
      file: "agents/ship.agent.md"
      description: "Garante qualidade, testa e coordena deployment"

features:
  - name: "Token Economy"
    description: "Redução de até 88% de tokens em comparação com AIOS completo"

  - name: "GitHub Copilot First"
    description: "Designed para funcionar nativamente com GitHub Copilot"

  - name: "Technology Agnostic"
    description: "Agnóstico de tecnologia - suporta qualquer stack backend/frontend/database"

  - name: "Story-Driven Development"
    description: "Desenvolvimento guiado por stories com rastreabilidade completa"

  - name: "Full-Stack Support"
    description: "Suporta projetos greenfield e brownfield com workflows diferentes"

tags:
  - "development-framework"
  - "ai-agents"
  - "token-economy"
  - "github-copilot"
  - "claude-code"
  - "mvp"
  - "agile"
  - "lightweight"

requirements:
  node:
    min: "18.0.0"
  npm:
    min: "9.0.0"

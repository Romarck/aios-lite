tasks:
  brainstorm:
    id: "brainstorm"
    title: "Project Ideation and Validation"
    description: "Initial brainstorming session to validate problem, users, and solution space"
    agent_responsible: "product"
    atomic_layer: true

    input:
      type: "object"
      required:
        - problem_statement
        - target_users
        - desired_outcomes

    output:
      type: "object"
      required:
        - brainstorm_document
        - validated_problem
        - user_list

  create_prd:
    id: "create_prd"
    title: "Create Product Requirements Document"
    description: "Document product vision, requirements, and acceptance criteria"
    agent_responsible: "product"
    atomic_layer: true
    depends_on: ["brainstorm"]

    input:
      type: "object"
      required:
        - brainstorm_results
        - stakeholder_feedback

    output:
      type: "object"
      required:
        - prd_document
        - user_stories
        - acceptance_criteria

  define_architecture:
    id: "define_architecture"
    title: "Define System Architecture"
    description: "Document technical architecture, technology stack, and design patterns"
    agent_responsible: "architect"
    atomic_layer: true
    depends_on: ["create_prd"]

    input:
      type: "object"
      required:
        - requirements
        - constraints
        - non_functional_requirements

    output:
      type: "object"
      required:
        - architecture_document
        - technology_stack
        - data_model

  design_user_experience:
    id: "design_user_experience"
    title: "Design User Experience"
    description: "Create wireframes, user flows, and design system"
    agent_responsible: "ux"
    atomic_layer: true
    depends_on: ["create_prd"]

    input:
      type: "object"
      required:
        - user_personas
        - user_stories
        - wireframe_requirements

    output:
      type: "object"
      required:
        - wireframes
        - design_system
        - user_flows

  implement_feature:
    id: "implement_feature"
    title: "Implement Feature from Story"
    description: "Code implementation of a validated user story"
    agent_responsible: "dev"
    atomic_layer: true
    depends_on: ["create_prd", "define_architecture"]

    input:
      type: "object"
      required:
        - story_id
        - acceptance_criteria
        - architecture

    output:
      type: "object"
      required:
        - code_changes
        - tests
        - documentation

  quality_assurance:
    id: "quality_assurance"
    title: "Quality Assurance Review"
    description: "Validate implementation against acceptance criteria and quality standards"
    agent_responsible: "ship"
    atomic_layer: true
    depends_on: ["implement_feature"]

    input:
      type: "object"
      required:
        - implementation
        - acceptance_criteria
        - test_results

    output:
      type: "object"
      required:
        - qa_approval
        - issues_list
        - deployment_readiness

  deploy_release:
    id: "deploy_release"
    title: "Deploy to Production"
    description: "Release approved changes to production environment"
    agent_responsible: "ship"
    atomic_layer: true
    depends_on: ["quality_assurance"]

    input:
      type: "object"
      required:
        - qa_approval
        - release_notes
        - deployment_plan

    output:
      type: "object"
      required:
        - deployment_confirmation
        - monitoring_setup
        - rollback_plan

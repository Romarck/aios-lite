workflows:
  greenfield_workflow:
    name: "Greenfield Project Workflow"
    description: "Workflow completo para iniciar um novo projeto do zero"
    agent_sequence:
      - product
      - architect
      - ux
      - dev
      - ship

    transitions:
      - from: product
        to: architect
        condition: "PRD and user stories defined"
        success_indicators:
          - "docs/prd.md exists"
          - "docs/stories/ has at least one story"

      - from: architect
        to: ux
        condition: "Stack and architecture defined"
        success_indicators:
          - "docs/architecture.md exists"
          - "Stack documented"

      - from: ux
        to: dev
        condition: "Design system and wireframes approved"
        success_indicators:
          - "Design system documented"
          - "Wireframes created"

      - from: dev
        to: ship
        condition: "Implementation complete"
        success_indicators:
          - "Code passes linting"
          - "Tests pass"

      - from: ship
        to: null
        condition: "QA approved and deployed"
        success_indicators:
          - "Story marked as approved"
          - "Deployed to production"

  brownfield_workflow:
    name: "Brownfield Project Workflow"
    description: "Workflow para melhorar um projeto existente"
    agent_sequence:
      - architect
      - product
      - ux
      - dev
      - ship

    transitions:
      - from: architect
        to: product
        condition: "Existing architecture audited"
        success_indicators:
          - "docs/audit.md exists"
          - "docs/architecture.md updated"

      - from: product
        to: ux
        condition: "Product vision and stories defined"
        success_indicators:
          - "docs/prd.md exists"
          - "docs/stories/ updated"

      - from: ux
        to: dev
        condition: "Design validated"
        success_indicators:
          - "Design decisions documented"

      - from: dev
        to: ship
        condition: "Implementation complete"
        success_indicators:
          - "Code quality checks pass"

      - from: ship
        to: null
        condition: "Release approved and deployed"
        success_indicators:
          - "All stories approved"
          - "Deployment completed"
